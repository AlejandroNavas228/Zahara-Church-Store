<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | Zahara</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/catalogo.css">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script>
        // Si no hay un "permiso" guardado en el navegador, lo devolvemos al login
        if (localStorage.getItem('zaharaAdminLogueado') !== 'true') {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body style="background-color: #050505; color: #fff;">

    <header class="header">
        <div class="logo-container">
            <h2 class="logo-texto">ZAHARA ADMIN</h2> 
        </div>
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="index.html">Ver Tienda</a></li>
                <li><a href="#" style="color: #ff3333;" onclick="localStorage.removeItem('zaharaAdminLogueado'); window.location.href='login.html';">Cerrar Sesión</a></li>
            </ul>
        </nav>
    </header>

    <main class="catalogo" style="padding: 40px 20px;">
        
        <h2 class="titulo-seccion">Agregar Nuevo Producto</h2>
        
         <form id="form-admin" class="admin-formulario">
            <h3 style="text-align: center; margin-bottom: 25px; color: #fff; font-family: 'Anton', sans-serif; letter-spacing: 1px;">Subir Nuevo Producto</h3>
            
            <div class="grupo-input">
                <label for="nombre-producto">Nombre del Producto</label>
                <input type="text" id="nombre-producto" placeholder="Ej: Camiseta Oversize Negra" required>
            </div>

            <div class="grupo-input">
                <label for="precio-producto">Precio (USD)</label>
                <input type="number" id="precio-producto" step="0.01" placeholder="Ej: 25.00" required>
            </div>

            <div class="grupo-input">
                <label for="stock-producto">Cantidad en Inventario (Stock)</label>
                <input type="number" id="stock-producto" placeholder="Ej: 15" required>
            </div>

            <div class="grupo-input">
                <label for="descripcion-producto">Descripción del Producto</label>
                <textarea id="descripcion-producto" rows="4" placeholder="Ej: Camiseta 100% algodón, diseño oversized con estampado en la espalda..." required></textarea>
            </div>

            <div class="grupo-input">
                <label for="imagen-producto">Foto del Producto</label>
                <input type="file" id="imagen-producto" accept="image/*" required>
            </div>

            <button type="submit" class="btn-guardar">
                <i class="fa-solid fa-cloud-arrow-up"></i> Guardar en Tienda
            </button>
        </form>

        <h2 class="titulo-seccion" style="margin-top: 60px; color: #28a745;">📦 Bandeja de Pedidos</h2>
        <p style="text-align: center; color: #aaa; max-width: 600px; margin: 0 auto 20px;">Aquí aparecerán los pagos reportados por los clientes. Al aprobarlos, el inventario se descontará automáticamente.</p>
        
        <div id="contenedor-ordenes" style="max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px;">
            </div>

        <h2 class="titulo-seccion" style="margin-top: 60px;">Inventario Actual</h2>
        
        <div style="max-width: 800px; margin: 0 auto; overflow-x: auto;">
            <table style="width: 100%; background: #111; color: white; border-collapse: collapse; text-align: left;">
                <thead>
                    <tr style="border-bottom: 2px solid #333; background: #222;">
                        <th style="padding: 12px;">Foto</th>
                        <th style="padding: 12px;">Nombre</th>
                        <th style="padding: 12px;">Precio</th>
                        <th style="padding: 12px; color: #28a745;">Stock</th> <th style="padding: 12px;">Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-productos">
                    </tbody>
            </table>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completar Pedido - Zahara Store</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/catalogo.css">
    <link rel="stylesheet" href="css/checkout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta property="og:title" content="Zahara Church Store 🔥">
    <meta property="og:description" content="Descubre nuestra nueva colección. Ropa con propósito y el mejor estilo. ¡Compra online ahora!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://zaharachurch.store">
    <meta property="og:image" content="assets/img/logo.jpeg">
</head>
<body class="bg-checkout">

    <div style="max-width: 1000px; margin: 20px auto 0; padding: 0 20px;">
        <a href="index.html" style="text-decoration: none; color: #28a745; font-size: 1em; font-weight: bold; transition: 0.3s;">
            <i class="fa-solid fa-chevron-left"></i> Volver a la tienda
        </a>
    </div>

    <header class="checkout-header">
        <h1>ZAHARA STORE</h1>
    </header>

    <div class="checkout-container">
        <div class="checkout-left">
            
            <section class="checkout-section">
                <h2>1. ¿A quién le enviamos?</h2>
                <p class="subtitle" style="margin-bottom: 15px; color: #aaa;">Necesitamos estos datos para contactarte sobre tu envío.</p>
                <input type="text" id="cliente-nombre" class="input-checkout" placeholder="Tu Nombre y Apellido" required>
                <input type="tel" id="cliente-telefono" class="input-checkout" placeholder="Teléfono (WhatsApp)" required>
            </section>

            <section class="checkout-section">
                <h2>2. Pago Seguro</h2>
                
                <div style="background: #111; padding: 25px; border-radius: 10px; border: 1px solid #333; text-align: center; margin-bottom: 25px;">
                    <div style="display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; font-size: 2rem; color: #555;">
                        <i class="fa-brands fa-cc-visa"></i>
                        <i class="fa-brands fa-cc-mastercard"></i>
                        <i class="fa-brands fa-paypal"></i>
                        <i class="fa-solid fa-money-bill-transfer"></i>
                    </div>
                    <p style="color: #ddd; font-size: 0.95rem; line-height: 1.5;">
                        Serás redirigido a nuestra pasarela encriptada <strong>Lumina Pay</strong> para completar tu compra de forma rápida y segura.
                    </p>
                </div>
            </section>

            <button id="btn-finalizar-compra" class="btn-block" style="display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 1.1rem; padding: 18px;">
                IR A PAGAR AHORA <i class="fa-solid fa-lock"></i>
            </button>
        </div>

        <div class="checkout-right">
            <h2 style="color: #fff; margin-top: 0; margin-bottom: 20px; font-size: 1.2rem;">Resumen de tu Orden</h2>
            
            <div id="resumen-carrito" class="resumen-items"></div>
            
            <div class="resumen-totales">
                <div class="fila-total" style="border-top: 2px solid #333; padding-top: 15px;">
                    <span style="font-size: 1.2rem;">Total a Pagar</span>
                    <span id="checkout-total" style="color: #28a745; font-size: 1.5rem; font-weight: 900;">$0.00</span>
                </div>
            </div>
        </div>
    </div>

    <div id="pantalla-factura" style="display: none; text-align: center; padding: 40px 20px;"></div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/checkout.js"></script> 
</body>
</html>
